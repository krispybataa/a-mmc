name: CI on Frontend Folder

on:
  push:
    branches:
      - main
    paths:
      - 'a-mmc_frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # defaults:
    #   run:
    #     working-directory: a-mmc_frontend

    steps:
      - uses: actions/checkout@v4

      # 🔹 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🔹 Install dependencies
      - name: Install dependencies
        run: cd a-mmc_frontend && npm install

      # 🔹 Run tests (even if none yet)
      - name: Run tests
        run: make test-frontend

      # Only runs if tests pass
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./a-mmc_frontend
          file: ./a-mmc_frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/a-mmc-frontend:latest
