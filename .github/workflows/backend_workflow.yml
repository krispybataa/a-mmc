name: CI on Backend Folder

on:
  push:
    branches:
      - main
    paths:
      - 'a-mmc_backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      ACTIONS_TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      FLASK_APP: app:create_app

    # defaults:
    #   run:
    #     working-directory: a-mmc_backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install dependencies
        run: cd a-mmc_backend && pip install -r requirements.txt

      # Wait for Postgres
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            sleep 1
          done

      # migrations
      - name: Run migrations
        run: cd a-mmc_backend && flask db upgrade

      # tests (via Makefile)
      - name: Run tests
        run: make test-backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./a-mmc_backend
          file: ./a-mmc_backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/a-mmc-backend:latest
