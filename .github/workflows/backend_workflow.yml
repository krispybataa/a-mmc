name: CI on Backend Folder

on:
  push:
    branches:
      - main
    paths:
      - 'a-mmc_backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run build if changes detected
        run: |
          echo "BACKEND Changes detected in src or config folder. Running the build process."
          # Your build commands go here (e.g., npm ci, npm run build)

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./a-mmc_backend
          file: ./a-mmc_backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/a-mmc-backend:latest