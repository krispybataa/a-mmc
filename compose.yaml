version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  a-mmc-frontend:
    image: "${FRONTEND_IMAGE}"
    container_name: "${FRONTEND_CONTAINER}"
    networks:
      - "${NETWORK_NAME}"

  a-mmc-backend:
    image: "${BACKEND_IMAGE}"
    container_name: "${BACKEND_CONTAINER}"
    networks:
      - "${NETWORK_NAME}"
    depends_on:
      - a-mmc-postgres

  a-mmc-nginx:
    image: "${NGINX_IMAGE}"
    container_name: "${NGINX_CONTAINER}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - "${NGINX_HTTP_PORT}:${NGINX_HTTP_PORT}"
      - "${NGINX_HTTPS_PORT}:${NGINX_HTTPS_PORT}"
    networks:
      - sample_network

  backend:
    build: 
      context: ./a-mmc_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - sample_network

  frontend:
    build:
      context: ./a-mmc_frontend
      dockerfile: dockerfile
    ports:
      - "80:80"
      - a-mmc-network
    volumes:
      # SSL certificates
      - "${NGINX_SSL_VOLUME}:${NGINX_SSL_DIR}:ro"

      # nginx.conf
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - a-mmc-frontend
      - a-mmc-backend

  a-mmc-postgres:
    image: "${POSTGRES_IMAGE}"
    container_name: "${POSTGRES_CONTAINER}"
    networks:
      - a-mmc-network
    volumes:
      - "${POSTGRES_DATA_VOLUME}:/var/lib/postgresql/data"
    # healthcheck:
    #   test: ["CMD-SHELL", "psql -U ${DB_USER} -d ${DB_MAIN} -c 'SELECT 1' || exit 1"]
    #   interval: ${CONTAINER_INTERVAL}
    #   timeout: ${CONTAINER_TIMEOUT}
    #   retries: ${CONTAINER_RETRIES}
    #   start_period: 20s

volumes:
  postgres_data:

networks:
  a-mmc-network:
    driver: bridge


volumes:
  a-mmc-nginx-ssl:
      driver: local
  a-mmc-postgres-data:
      driver: local
