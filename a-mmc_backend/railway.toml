[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "flask db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 120 'app:create_app()'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/health"
initialDelaySeconds = 10
timeoutSeconds = 5
