version: "3.9"

services:

  a-mmc-frontend:
    image: "${FRONTEND_IMAGE}"
    container_name: "${FRONTEND_CONTAINER}"
    networks:
      - "${NETWORK_NAME}"

  a-mmc-backend:
    image: "${BACKEND_IMAGE}"
    container_name: "${BACKEND_CONTAINER}"
    networks:
      - "${NETWORK_NAME}"
    depends_on:
      - "${POSTGRES_CONTAINER}"

  a-mmc-nginx:
    image: "${NGINX_IMAGE}"
    container_name: "${NGINX_CONTAINER}"
    ports:
      - "${NGINX_HTTP_PORT}:${NGINX_HTTP_PORT}"
      - "${NGINX_HTTPS_PORT}:${NGINX_HTTPS_PORT}"
    networks:
      - a-mmc-network
    volumes:
      # SSL certificates
      - "${NGINX_SSL_VOLUME}:${NGINX_SSL_DIR}:ro"

      # nginx.conf
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - "${FRONTEND_CONTAINER}"
      - "${BACKEND_CONTAINER}"

  a-mmc-postgres:
    image: "${POSTGRES_IMAGE}"
    container_name: "${POSTGRES_CONTAINER}"
    networks:
      - a-mmc-network
    volumes:
      - "${POSTGRES_DATA_VOLUME}:/var/lib/postgresql/data"
    # healthcheck:
    #   test: ["CMD-SHELL", "psql -U ${DB_USER} -d ${DB_MAIN} -c 'SELECT 1' || exit 1"]
    #   interval: ${CONTAINER_INTERVAL}
    #   timeout: ${CONTAINER_TIMEOUT}
    #   retries: ${CONTAINER_RETRIES}
    #   start_period: 20s

networks:
  a-mmc-network:
    driver: bridge

volumes:
  a-mmc-postgres-data:
      driver: local
